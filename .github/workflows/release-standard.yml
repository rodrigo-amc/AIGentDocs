name: Release standard bundle

# The no-CLI adoption path (Layer 0): on every standard version tag,
# publish a tarball/zip containing exactly what `aigentdocs init`
# scaffolds — docs/standard/, the empty docs/project/ tree, the status
# artifacts, and the AGENTS.md stub. Unpack at the repository root.

on:
  push:
    tags: ["standard-v*"]

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install and build
        run: npm ci && npm run build
      - name: Verify the tag matches the standard version
        run: node scripts/check-standard-version.mjs "$GITHUB_REF_NAME"
      - name: Assemble the bundle with our own init (dogfooding)
        run: |
          VERSION="${GITHUB_REF_NAME#standard-v}"
          mkdir -p /tmp/bundle
          node packages/cli/dist/src/index.js init /tmp/bundle
          tar -czf "aigentdocs-standard-${VERSION}.tar.gz" -C /tmp/bundle .
          (cd /tmp/bundle && zip -qr "$GITHUB_WORKSPACE/aigentdocs-standard-${VERSION}.zip" .)
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#standard-v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Standard v${VERSION}" \
            --notes "AIGentDocs standard v${VERSION}. The attached bundle is the no-CLI adoption path: unpack it at your repository root and customize docs/standard/README.md. Changes: see docs/standard/changelog.yaml." \
            "aigentdocs-standard-${VERSION}.tar.gz" \
            "aigentdocs-standard-${VERSION}.zip"
