name: "AIGentDocs Lint"
description: >
  Validate AIGentDocs documentation compliance (deterministic, no LLM).
  The tool informs, the human decides: only critical findings fail, the
  fail-on input can disable failing entirely, and whether a failed check
  blocks merging is the repository's branch-protection choice — never
  this action's.
author: "AIGentDocs"
branding:
  icon: "book-open"
  color: "blue"

inputs:
  path:
    description: "Path of the repository to lint (must contain docs/project/)."
    required: false
    default: "."
  fail-on:
    description: "'critical' fails the step on critical findings; 'never' always reports without failing."
    required: false
    default: "critical"
  version:
    description: "Version of the aigentdocs CLI to run (npm dist-tag or semver)."
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Run aigentdocs lint
      shell: bash
      # Inputs are routed through env, never interpolated into the script:
      # an adopter wiring untrusted data into them must not gain script injection.
      env:
        AIGENTDOCS_LINT_PATH: ${{ inputs.path }}
        AIGENTDOCS_CLI_VERSION: ${{ inputs.version }}
        AIGENTDOCS_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set +e
        npx --yes "aigentdocs@${AIGENTDOCS_CLI_VERSION}" lint "${AIGENTDOCS_LINT_PATH}"
        status=$?
        set -e
        if [ "${AIGENTDOCS_FAIL_ON}" = "never" ]; then
          if [ $status -ne 0 ]; then
            echo "::warning::aigentdocs lint reported findings (fail-on: never, so this step does not fail)."
          fi
          exit 0
        fi
        exit $status
