      description: >
        Descripción del Glosario del Dominio en 01_product/README.md enriquecida para
        referenciar DDD y Knowledge Crunching.
    - type: changed
      description: >
        Descripción de vision.md en la estructura de directorios de docs/README.md
        actualizada para reflejar el nuevo alcance (Mapa de Entidades + DDD).

