# Version History of the Documentation Standard
# Each entry records a version of the standard and its changes.

- version: "1.4.5"
  date: "2026-06-12"
  summary: "Project renamed to AIGentDocs"
  changes:
    - type: changed
      description: >
        The project's correct name is AIGentDocs (matching the repository),
        not AIGenticDocs. Every mention in the standard, templates, and
        tooling was updated; the npm packages were republished as
        aigentdocs, @aigentdocs/core, and @aigentdocs/standard, and the
        misnamed ones unpublished. The short bin alias remains agd.

- version: "1.4.4"
  date: "2026-06-12"
  summary: "QUICKSTART updated for the tooling era"
  changes:
    - type: changed
      description: >
        Installation now leads with the CLI (npx aigentdocs init, hooks
        install, adapt) and keeps the no-tooling path as a first-class
        alternative (release bundle or manual copy). Lite Mode mentions
        init --lite and the lint-as-todo-list flow.
    - type: changed
      description: >
        Auditing reflects the two layers of AGENT_REVIEW.md: the mechanical
        layer is the deterministic linter (pre-commit hook + GitHub Action);
        the semantic layer remains the agent audit prompt.
    - type: added
      description: >
        'Keeping the standard up to date' section documenting
        aigentdocs update / update --check.
    - type: changed
      description: >
        Removed a stale pre-1.2 reference claiming each layer has its own
        README.md/AGENT.md pair (superseded by guide_*/agent_* files).

- version: "1.4.3"
  date: "2026-06-11"
  summary: "Uniform date placeholders in templates"
  changes:
    - type: changed
      description: >
        All template frontmatter now uses the literal 'YYYY-MM-DD'
        placeholder for last_updated (some templates carried concrete
        dates, and vision.md used comment-style placeholders). Enables
        'aigentdocs init' to stamp the current date uniformly when
        copying templates.

- version: "1.4.2"
  date: "2026-06-11"
  summary: "Guide/template reconciliation found by dogfooding the linter"
  changes:
    - type: changed
      description: >
        templates/domain_module.md now includes the 'Attributes /
        Properties' [REQUIRED] section that guide_domain_modules.md always
        mandated but the template omitted.
    - type: changed
      description: >
        templates/api_guidelines.md headings reconciled with the section
        table of guide_engineering.md (API Standard, Endpoint Conventions,
        Request/Response Format, Authentication and Authorization, plus the
        two optional sections). Both mismatches surfaced while implementing
        the mechanical section checks of the linter.

- version: "1.4.1"
  date: "2026-06-11"
  summary: "tech_stack.yaml schema fix found by dogfooding"
  changes:
    - type: changed
      description: >
        The 'frontend' and 'database' sections of tech_stack.yaml are now
        [CONDITIONAL] instead of [REQUIRED]: projects without a frontend or
        a database (CLIs, libraries, services) omit them. Found while
        documenting the AIGentDocs tooling itself with the standard.

- version: "1.4.0"
  date: "2026-06-10"
  summary: "English as primary language, full implementation cycle, status artifacts, anti-drift enforcement basis, and cross-cutting corrections"
  changes:
    - type: changed
      description: >
        The standard's primary language is now English (US). Full one-shot
        translation of standard/; [OBLIGATORIO]/[OPCIONAL]/[CONDICIONAL]
        markers became [REQUIRED]/[OPTIONAL]/[CONDITIONAL]; tech_stack.yaml
        schema keys translated (database, global_constraints, name, etc.).
    - type: added
      description: >
        templates/AGENTS.md: entry-point stub for the adopting repository's
        root, compatible with the de facto AGENTS.md standard. Removes the
        dependency on a human telling the agent where to start.
    - type: added
      description: >
        Lite Mode: official minimal adoption profile (vision.md + roadmap.md
        + tech_stack.yaml), with explicit rules, upgrade signals, and an
        incremental Lite-to-Full path. Declared via 'Adoption profile' in the
        README Conventions table.
    - type: changed
      description: >
        AGENT_REVIEW.md split into two layers: Mechanical (deterministic,
        designed to be absorbed by lint tooling) and Semantic (judgment,
        always the auditor's job). Stale pre-1.2 checks removed; new
        cross-document coherence checks added.
    - type: added
      description: >
        Anti-Drift Protocol in AGENT.md: explicit table mapping each
        triggering event to the documentation update required in the same
        change, plus drift-handling rules. Deliberately mechanical, as the
        basis for future pre-commit/CI enforcement.
    - type: changed
      description: >
        Deduplication across README/AGENT/QUICKSTART under the new principle
        8, 'Single Canonical Source': each concept is specified in exactly
        one document; the others point to it.
    - type: added
      description: >
        Project Status Artifacts: project_status.yaml (single source of
        truth for module state, coverage, and debt — frontmatter state and
        the Kanban board are views that must not contradict it) and TODO.md
        (cross-module pending items; explicitly not the backlog). Wired into
        the Reading Protocol, the Anti-Drift Protocol, and both adoption
        guides.
    - type: added
      description: >
        Operational Patterns in AGENT.md: Documentation > Code (the code is
        presumed wrong on contradiction), sub-agents read / the main agent
        writes, main agent vs. delegated subagent criteria, the triple
        distinction (not documented / documented but not implemented / out
        of scope), and stop on inconsistency.
    - type: added
      description: >
        Implementation Mode agent profiles, generalized from practice:
        agent_scaffold.md, agent_module_developer.md (Creation/Maintenance
        modes with scope restriction), agent_code_reviewer.md (read-only),
        agent_integration_tester.md (discrepancies classified as
        implementation bug / design flaw / undocumented behavior).
    - type: added
      description: >
        05_corrections session and Correction Records: cross-cutting design
        defects are corrected through an artifact with lifecycle (proposed,
        approved, applied) whose approved Impact Map is the session's write
        scope. Third Session Guard exception; new guide_corrections.md,
        agent_corrections.md, and templates/correction.md.

- version: "1.3.0"
  date: "2026-03-21"
  summary: "Agent instruction optimization: Agent Profile, deduplication, and Session Focus"
  changes:
    - type: added
      description: >
        'Agent Profile' section in every agent_*.md. Defines Role (Senior),
        Expertise (autonomous professional knowledge), Goal, and Produces for
        each working context.
    - type: added
      description: >
        'Session Focus' subsection in agent_product.md, agent_architecture.md,
        and agent_engineering.md. Instructs the agent to ask the user which
        specific document will be worked on, limiting each session to a single
        document.
    - type: changed
      description: >
        Removed duplicated content in agent_*.md that replicated information
        already present in the corresponding guide_*.md files (granularity
        heuristics, ADR immutability rules, User Story format, directory
        purpose descriptions).
    - type: changed
      description: >
        Mermaid diagram conventions moved from agent_architecture.md to
        guide_architecture.md (specification content, not behavior).
    - type: changed
      description: >
        'reads' field in agent_*.md frontmatter normalized to array format.
        agent_product.md now includes guide_domain_modules.md in its list of
        required readings.

- version: "1.2.0"
  date: "2026-03-01"
  summary: "Separation of the standard from project documents"
  changes:
    - type: changed
      description: >
        Major restructuring: separation of the framework (standard/) from the
        project documents (project/). The standard is now flat, with no
        numbered subdirectories.
    - type: added
      description: >
        guide_*.md and agent_*.md files with enriched frontmatter
        (scope, project_path, required_files, optional_files, sessions, reads).
    - type: added
      description: >
        standard/templates/ directory with reference templates for agents.
        Templates no longer live in project/; the agent replicates them.
    - type: added
      description: >
        New templates: domain_module.md (generic), api_guidelines.md (conditional).
    - type: removed
      description: >
        Removed ADR-0001 (0001-record-architecture-decisions.md). Its content
        was incorporated as a reference into guide_adrs.md.
    - type: changed
      description: >
        All internal references updated to reflect the new standard/ and
        project/ structure.

- version: "1.1.0"
  date: "2026-02-27"
  summary: "Integration of Domain-Driven Design (DDD) into the standard"
  changes:
    - type: added
      description: >
        'Domain Discovery (Knowledge Crunching — DDD)' section in 01_product/AGENT.md.
        Defines the required 4-step process for discovering entities, business rules, and
        the Ubiquitous Language before creating domain modules.
    - type: added
      description: >
        New required 'Domain Entity Map' section for vision.md,
        defined in 01_product/README.md. Acts as the bridge between vision.md and domain_modules/.
    - type: changed
      description: >
        Domain Glossary description in 01_product/README.md enriched to
        reference DDD and Knowledge Crunching.
    - type: changed
      description: >
        Description of vision.md in the docs/README.md directory structure
        updated to reflect the new scope (Entity Map + DDD).

- version: "1.0"
  date: "2026-02-23"
  summary: "Initial version of the documentation standard"
  changes:
    - type: added
      description: "Directory structure definition (01_product, 02_architecture, 03_engineering, 04_adrs)."
    - type: added
      description: "Creation of reading and maintenance protocols."
    - type: added
      description: "Definition of YAML frontmatter conventions."
    - type: added
      description: "Creation of operating instructions for AI agents (AGENT.md)."
    - type: added
      description: "Creation of the audit prompt (AGENT_REVIEW.md)."
