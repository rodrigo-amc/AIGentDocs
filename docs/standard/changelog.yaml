# Historial de Versiones del Estándar de Documentación
# Cada entrada registra una versión del estándar con sus cambios.

- version: "1.2.0"
  date: "2026-03-01"
  summary: "Separación de estándar y documentos de proyecto"
  changes:
    - type: changed
      description: >
        Reestructuración mayor: separación del framework (standard/) de los
        documentos del proyecto (project/). El estándar ahora es plano, sin
        subdirectorios numéricos.
    - type: added
      description: >
        Archivos guide_*.md y agent_*.md con frontmatter enriquecido
        (scope, project_path, required_files, optional_files, sessions, reads).
    - type: added
      description: >
        Directorio standard/templates/ con templates de referencia para agentes.
        Los templates ya no viven en project/ sino que el agente los replica.
    - type: added
      description: >
        Nuevos templates: domain_module.md (genérico), api_guidelines.md (condicional).
    - type: removed
      description: >
        Eliminado ADR-0001 (0001-registrar-decisiones-de-arquitectura.md). Su
        contenido se incorporó como referencia en guide_adrs.md.
    - type: changed
      description: >
        Todas las referencias internas actualizadas para reflejar la nueva
        estructura standard/ y project/.

- version: "1.1.0"
  date: "2026-02-27"
  summary: "Integración de Domain-Driven Design (DDD) al estándar"
  changes:
    - type: added
      description: >
        Sección 'Descubrimiento de Dominio (Knowledge Crunching — DDD)' en 01_product/AGENT.md.
        Define el proceso obligatorio de 4 pasos para descubrir entidades, reglas de negocio y
        Ubiquitous Language antes de crear módulos de dominio.
    - type: added
      description: >
        Nueva sección obligatoria 'Mapa de Entidades del Dominio' para vision.md,
        definida en 01_product/README.md. Actúa como puente entre vision.md y domain_modules/.
    - type: changed
      description: >
        Descripción del Glosario del Dominio en 01_product/README.md enriquecida para
        referenciar DDD y Knowledge Crunching.
    - type: changed
      description: >
        Descripción de vision.md en la estructura de directorios de docs/README.md
        actualizada para reflejar el nuevo alcance (Mapa de Entidades + DDD).

- version: "1.0"
  date: "2026-02-23"
  summary: "Versión inicial del estándar de documentación"
  changes:
    - type: added
      description: "Definición de estructura de directorios (01_product, 02_architecture, 03_engineering, 04_adrs)."
    - type: added
      description: "Creación de protocolos de lectura y mantenimiento."
    - type: added
      description: "Definición de convenciones de frontmatter YAML."
    - type: added
      description: "Creación de instrucciones operativas para agentes de IA (AGENT.md)."
    - type: added
      description: "Creación de prompt de auditoría (AGENT_REVIEW.md)."
