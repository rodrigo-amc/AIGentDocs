# Version History of the Documentation Standard
# Each entry records a version of the standard and its changes.

- version: "1.3.0"
  date: "2026-03-21"
  summary: "Agent instruction optimization: Agent Profile, deduplication, and Session Focus"
  changes:
    - type: added
      description: >
        'Agent Profile' section in every agent_*.md. Defines Role (Senior),
        Expertise (autonomous professional knowledge), Goal, and Produces for
        each working context.
    - type: added
      description: >
        'Session Focus' subsection in agent_product.md, agent_architecture.md,
        and agent_engineering.md. Instructs the agent to ask the user which
        specific document will be worked on, limiting each session to a single
        document.
    - type: changed
      description: >
        Removed duplicated content in agent_*.md that replicated information
        already present in the corresponding guide_*.md files (granularity
        heuristics, ADR immutability rules, User Story format, directory
        purpose descriptions).
    - type: changed
      description: >
        Mermaid diagram conventions moved from agent_architecture.md to
        guide_architecture.md (specification content, not behavior).
    - type: changed
      description: >
        'reads' field in agent_*.md frontmatter normalized to array format.
        agent_product.md now includes guide_domain_modules.md in its list of
        required readings.

- version: "1.2.0"
  date: "2026-03-01"
  summary: "Separation of the standard from project documents"
  changes:
    - type: changed
      description: >
        Major restructuring: separation of the framework (standard/) from the
        project documents (project/). The standard is now flat, with no
        numbered subdirectories.
    - type: added
      description: >
        guide_*.md and agent_*.md files with enriched frontmatter
        (scope, project_path, required_files, optional_files, sessions, reads).
    - type: added
      description: >
        standard/templates/ directory with reference templates for agents.
        Templates no longer live in project/; the agent replicates them.
    - type: added
      description: >
        New templates: domain_module.md (generic), api_guidelines.md (conditional).
    - type: removed
      description: >
        Removed ADR-0001 (0001-record-architecture-decisions.md). Its content
        was incorporated as a reference into guide_adrs.md.
    - type: changed
      description: >
        All internal references updated to reflect the new standard/ and
        project/ structure.

- version: "1.1.0"
  date: "2026-02-27"
  summary: "Integration of Domain-Driven Design (DDD) into the standard"
  changes:
    - type: added
      description: >
        'Domain Discovery (Knowledge Crunching — DDD)' section in 01_product/AGENT.md.
        Defines the required 4-step process for discovering entities, business rules, and
        the Ubiquitous Language before creating domain modules.
    - type: added
      description: >
        New required 'Domain Entity Map' section for vision.md,
        defined in 01_product/README.md. Acts as the bridge between vision.md and domain_modules/.
    - type: changed
      description: >
        Domain Glossary description in 01_product/README.md enriched to
        reference DDD and Knowledge Crunching.
    - type: changed
      description: >
        Description of vision.md in the docs/README.md directory structure
        updated to reflect the new scope (Entity Map + DDD).

- version: "1.0"
  date: "2026-02-23"
  summary: "Initial version of the documentation standard"
  changes:
    - type: added
      description: "Directory structure definition (01_product, 02_architecture, 03_engineering, 04_adrs)."
    - type: added
      description: "Creation of reading and maintenance protocols."
    - type: added
      description: "Definition of YAML frontmatter conventions."
    - type: added
      description: "Creation of operating instructions for AI agents (AGENT.md)."
    - type: added
      description: "Creation of the audit prompt (AGENT_REVIEW.md)."
