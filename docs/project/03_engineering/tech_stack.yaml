# Technology Stack — AIGentDocs tooling (CLI + MCP server)
# Every AI agent must read this before generating code.
# Profile: lite — ADR fields are filled where the decision is recorded;
# remaining decisions (e.g., CLI argument parser) require their own ADR
# before introducing the dependency.

backend:
  language:
    name: TypeScript
    version: "5.x (strict mode)"
    adr: "0002-typescript-on-node-as-runtime.md"
  runtime:
    name: Node.js
    version: ">=20 (LTS)"
    adr: "0002-typescript-on-node-as-runtime.md"
  dependency_manager:
    name: npm
    version: ">=10"
    adr: "0002-typescript-on-node-as-runtime.md"
    note: "npm workspaces for the monorepo (packages/core, packages/cli, packages/mcp)."
  yaml_parser:
    name: yaml (npm package)
    version: "^2.9"
    adr: "0003-yaml-package-for-parsing.md"
    note: "Runtime dependency of @aigentdocs/core; published packages import it exclusively through core's frontmatter.ts wrapper. Repo build scripts (scripts/*.mjs) may import it directly, declared as a root devDependency — never via hoisting (ADR-0008)."
  mcp_sdk:
    name: "@modelcontextprotocol/sdk"
    version: "^1.29"
    adr: "0005-mcp-sdk.md"
    note: "Runtime dependency of @aigentdocs/mcp only; the CLI and core do not depend on it."
  schema_validation:
    name: zod
    version: "^3.25"
    adr: "0005-mcp-sdk.md"
    note: "Tool input schemas for the MCP server (@aigentdocs/mcp)."

global_constraints:
  - "Do not install or propose new dependencies without discussing it with the human developer and recording the corresponding ADR."
  - "Internal @aigentdocs/* dependencies in published packages are pinned to exact versions and released in lockstep from the monorepo (ADR-0007) — no caret/tilde ranges."
  - "Runtime dependencies must be minimal: prefer the Node standard library; every runtime dependency needs an ADR."
  - "docs/standard/ is the product: the tooling reads it as an asset and never mutates it at runtime."
  - "lint must be fully deterministic: no network access, no LLM calls."
